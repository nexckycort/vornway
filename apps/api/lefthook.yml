pre-commit:
  parallel: true
  commands:
    typecheck-api:
      root: apps/api
      glob: "*.{js,ts,jsx,tsx,prisma}"
      run: bun typecheck
      fail_text: "TypeScript type checking failed for api"
    biome-api:
      root: apps/api
      glob: "*.{js,ts,jsx,tsx}"
      run: bun check {staged_files}
      stage_fixed: true
      fail_text: "Biome linting/formatting failed for api"
